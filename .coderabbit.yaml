# CodeRabbit Configuration for Flutter/Dart Project
# https://coderabbit.ai
# 
# Optimized configuration based on CodeRabbit best practices for Flutter/Dart projects

# Language setting for reviews
language: "en-US"

# Review settings
reviews:
  enabled: true
  # Use "assertive" profile for more thorough code reviews
  profile: "assertive"
  # Enable request changes workflow for interactive reviews
  request_changes_workflow: true
  # High-level summary of changes in review
  high_level_summary: true
  # Automatic review settings
  auto_review:
    enabled: true
    drafts: true

  # Collapse the walkthrough in PR comments
  collapse_walkthrough: true
  # Enable sequence diagrams for architecture visualization
  sequence_diagrams: true
  # Enable code review effort estimation
  estimate_code_review_effort: true

  # Path filters - include our app code, exclude generated/build files
  path_filters:
    # Include our app code
    - "expensiveapp/lib/**"
    # Exclude generated files
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    # Exclude platform-specific folders
    - "android/**"
    - "ios/**"
    - "web/**"
    - "linux/**"
    - "macos/**"
    - "windows/**"
    # Exclude build artifacts
    - "build/**"
    - ".dart_tool/**"
    - ".pub-cache/**"
    - "test/*.fake.dart"
    # Exclude Firebase config
    - "**/.firebase/**"
    - "lib/firebase_options.dart"
    - "lib/**/*.firebase.dart"

  # Path-specific instructions for Flutter/Dart codebase
  path_instructions:
    - path: "lib/**"
      instructions: |
        This is a Flutter/Dart application with a simple directory structure.

        Focus on:
        - No business logic inside widgets (use services)
        - Proper state management usage (Provider, Riverpod, Bloc, etc.)
        - Null safety correctness
        - Widget rebuild optimization (avoid unnecessary rebuilds)
        - Code readability and modularity
        - Avoid duplicated code
        - Proper error handling

        Flag:
        - Large widgets without separation (>100 lines)
        - Heavy logic inside build() method
        - Improper async handling
        - Missing dispose methods for controllers
        - Hardcoded strings (use constants/l10n)

    - path: "lib/models/**"
      instructions: |
        Data models and entities.

        Validate:
        - Proper JSON serialization (fromJson / toJson)
        - Null safety compliance
        - Immutable design (use final fields)
        - Proper typing (avoid dynamic)
        - Documentation for public APIs

    - path: "lib/services/**"
      instructions: |
        Business logic and external services layer.

        Ensure:
        - Business logic isolated from UI
        - Proper abstraction over SDKs (Firebase, APIs, etc.)
        - No direct Firebase/API calls in widgets (use services)
        - Error handling and logging
        - API timeout configurations
        - No hardcoded secrets or credentials

    - path: "lib/screens/**"
      instructions: |
        UI screens - Flutter widgets and screens.

        Ensure:
        - Pure presentation logic only
        - No direct Firebase or API calls (use services)
        - Proper widget composition and reuse
        - Responsive design considerations
        - Accessibility best practices
        - Theme consistency

    - path: "test/**"
      instructions: |
        Test files.

        Validate:
        - Good test coverage
        - Proper arrange-act-assert structure
        - Mock external dependencies
        - Test naming conventions

# Tools section - enable/disable specific linters and tools
tools:
  # Enable Flutter/Dart-specific tools
  enabled:
    - flutter
    - dart
    - go
    - terraform
    - docker
    - javascript
    - typescript
  # Disable tools not needed for Flutter/Dart projects
  disabled:
    - rubocop      # Ruby linter - not used in Flutter project
    - swiftlint    # Swift linter - not used in Flutter project
    - tflint       # Terraform linter - keep enabled if needed
    - eslint      # JS/TS - consider disabling if purely Dart
    - gitleaks    # Security scanner - keep for secrets detection

# Chat section - enable AI chat features
chat:
  auto_reply: true

# Knowledge base for learning from codebase
knowledge_base:
  opt_out: false
  learnings:
    scope: auto